services:
  postgres:
    image: postgres:15-alpine
    container_name: guardagent_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: guardagent
      POSTGRES_PASSWORD: guardagent
      POSTGRES_DB: guardagent
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardagent"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: guardagent_redis_dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
